name: Tests

on:
  workflow_dispatch:      # запуск вручную «по желанию» (вкладка Actions → Run workflow)
  pull_request:
  push:
    branches:
      - main

jobs:
  formulas:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run formula and scenario tests
        run: npm test
